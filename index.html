<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowR Sell</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
    <div id="game-container">
        <div id="left-sidebar">
            <h2>Inventory</h2>
            <div id="inventory-list"></div>

            <hr>
            
            <h2>Build Menu</h2>
            <div id="build-options">
                <button class="build-btn delete" data-type="delete">
                    <span class="btn-name">Remove</span>
                </button>
            </div>
            
            <hr>
            <h2>Data Center</h2>
            <div class="data-controls" style="display: flex; gap: 10px; padding-bottom: 10px;">
                <button id="save-btn" style="flex-grow: 1; padding: 10px; cursor: pointer;">Save Factory</button>
                <button id="load-btn" style="flex-grow: 1; padding: 10px; cursor: pointer;">Load Factory</button>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
        
        <div id="right-sidebar">
            
            <div class="controls-info">
                <p><strong>Current Rotation:</strong> <span id="rotation-display">RIGHT</span></p>
                <button id="rotate-btn">Rotate Building (R)</button>
            </div>

            <hr>

            <div class="instructions">
                <h3>Controls:</h3>
                <ul>
                    <li><strong>WASD / Arrow Keys:</strong> Move Player</li>
                    <li><strong>Q:</strong> Mine natural resource block under player</li>
                    <li><strong>Left Click:</strong> Build / Demolish on grid</li>
                    <li><strong>R:</strong> Rotate building selection</li>
                </ul>
            </div>
        </div>
    </div>
    <div class="handbook-wrapper">
        <button id="book-toggle-btn">📖 Open Guide Book</button>
        <div id="book-modal-overlay">
            <div id="book-modal">
                <div class="modal-header">
                    <h2>Factory Handbook</h2>
                    <button id="book-close-x">✕</button>
                </div>
                <div id="book-headers"></div>
                <div id="book-content"></div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
